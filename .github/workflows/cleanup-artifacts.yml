name: Cleanup All Artifacts

on:
  workflow_dispatch:

jobs:
  delete-artifacts:
    name: Delete All Artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete all artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`Fetching artifacts for ${owner}/${repo}...`);
            const opts = github.rest.actions.listArtifactsForRepo.endpoint.merge({
              owner: owner,
              repo: repo,
              per_page: 100
            });
            
            const artifacts = await github.paginate(opts);
            console.log(`Found ${artifacts.length} artifacts to delete.`);
            
            for (const artifact of artifacts) {
              console.log(`Deleting artifact: ${artifact.name} (ID: ${artifact.id})...`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner: owner,
                  repo: repo,
                  artifact_id: artifact.id
                });
              } catch (err) {
                console.log(`Failed to delete artifact ${artifact.id}: ${err.message}`);
              }
            }
            console.log('All artifacts cleaned up successfully!');
